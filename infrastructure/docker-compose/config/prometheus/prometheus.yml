global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['order-service:8081']

  - job_name: 'purchase-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['purchase-service:8082']

  - job_name: 'customer-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['customer-service:8000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-node-1:7001']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-1:9093']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']