server:
  port: 8083

spring:
  application:
    name: auth-service
  
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  
  sql:
    init:
      mode: always
  
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: AuthDevHikariPool
  
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      timeout: 10000ms

jwt:
  secret: dev-secret-key-for-testing-only-please-change-in-production
  expiration: 86400000

logging:
  level:
    root: INFO
    com.ecommerce.auth: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.springframework.boot.sql.init: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,h2-console
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    enabled: false
  ratelimiter:
    enabled: false
