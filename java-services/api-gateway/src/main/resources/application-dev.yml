# 开发环境配置 - 无Docker运行模式
# 使用方式: java -jar api-gateway.jar --spring.profiles.active=dev

server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  # 禁用Redis (开发模式)
  data:
    redis:
      host: localhost
      port: 6379
  
  # 禁用Nacos服务发现 (使用静态路由)
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false
    
    gateway:
      # 使用静态路由而非负载均衡 (lb://)
      routes:
        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
        
        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0
        
        - id: purchase-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/purchase/**
          filters:
            - StripPrefix=0
        
        - id: product-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0
        
        - id: platform-douyin
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/platform/douyin/**
          filters:
            - StripPrefix=0
        
        - id: platform-xiaohongshu
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/platform/xiaohongshu/**
          filters:
            - StripPrefix=0
        
        - id: platform-1688
          uri: http://localhost:8089
          predicates:
            - Path=/api/v1/platform/1688/**
          filters:
            - StripPrefix=0
      
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

# 禁用Resilience4j (简化配置)
resilience4j:
  circuitbreaker:
    enabled: false

# 禁用认证过滤器 (开发模式临时禁用)
auth:
  enabled: false

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# 日志配置
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    com.ecommerce.gateway: DEBUG
