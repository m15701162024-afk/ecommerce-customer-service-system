server:
  port: 8085

spring:
  application:
    name: purchase-service

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_purchase?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # H2内存数据库配置 (开发环境可用)
    # url: jdbc:h2:mem:purchasedb
    # driver-class-name: org.h2.Driver
    # username: sa
    # password: 

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # H2控制台 (使用H2时启用)
  h2:
    console:
      enabled: false

# 日志配置
logging:
  level:
    com.ecommerce.purchase: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Swagger/OpenAPI配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 业务配置
purchase:
  # 自动支付阈值 (元)
  auto-pay-threshold: 1000
  # 预警阈值 (元)
  warning-threshold: 10000