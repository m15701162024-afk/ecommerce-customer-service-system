server:
  port: 8084

spring:
  application:
    name: order-service
  
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      pool-name: OrderDevHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
  
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0

redisson:
  enabled: false

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ecommerce.order.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.cloud: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,h2-console
  endpoint:
    health:
      show-details: always

feign:
  client:
    config:
      default:
        connect-timeout: 5000
        read-timeout: 5000
        logger-level: fullspring:
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false
